name: 🍎 Build iOS IPA

on:
  workflow_dispatch:   # Manual trigger only — run when you want a build

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: flutter pub get

      # Builds an unsigned IPA (no Apple Developer account needed for sideloading)
      - name: 🔨 Build iOS (no codesign)
        working-directory: frontend
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      # Package the .app into an IPA manually
      - name: 📦 Package IPA
        working-directory: frontend
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -r EGX.ipa Payload

      # Upload the IPA as a downloadable artifact
      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EGX-iOS
          path: frontend/build/ios/iphoneos/EGX.ipa
          retention-days: 7
