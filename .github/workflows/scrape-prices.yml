name: 🕙 EGX Price Scraper (Market Hours)

# ─────────────────────────────────────────────────────────────────────────────
# Schedule (UTC):
#   Start  → 06:50 UTC  =  09:50 UTC+3  (market open)
#
# The runScraper.js script loops internally and self-exits at:
#   Stop   → 11:30 UTC  =  14:30 UTC+3  (market close)
#
# Runs Sun–Thu (EGX trading days = 0-4 in GitHub cron which is Mon-indexed,
# so Sun=0,Mon=1,Tue=2,Wed=3,Thu=4 → use 0-4).
# GitHub cron uses standard cron where 0=Sunday, so Sun–Thu = 0,1,2,3,4
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '50 6 * * 0-4'   # 06:50 UTC  →  09:50 Cairo (UTC+3)

  # Allow manual trigger from the GitHub UI for testing
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Market Prices
    runs-on: ubuntu-latest

    # Safety ceiling: the script self-exits at 14:30 Cairo (~4h40m window).
    # Set timeout slightly above that to avoid runner hanging on unexpected errors.
    timeout-minutes: 300   # 5 hours hard cap

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ── 3. Install Puppeteer system dependencies (Ubuntu) ───────────────────
      - name: 📦 Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libpangocairo-1.0-0 libx11-xcb1 \
            fonts-liberation

      # ── 4. Install Node dependencies ─────────────────────────────────────────
      - name: 📦 Install Node dependencies
        working-directory: backend
        run: npm ci

      # ── 5. Run the scraper loop ───────────────────────────────────────────────
      #       The script connects to Mongo, scrapes in a loop every 5 min,
      #       and exits cleanly at 14:30 Cairo (11:30 UTC).
      - name: 🔄 Run price scraper loop
        working-directory: backend
        env:
          # ── Required secrets (set these in GitHub → Settings → Secrets) ──────
          MONGO_URI:                ${{ secrets.MONGO_URI }}
          JWT_SECRET:               ${{ secrets.JWT_SECRET }}
          MUBASHER_TRADE_USERNAME:  ${{ secrets.MUBASHER_TRADE_USERNAME }}
          MUBASHER_TRADE_PASSWORD:  ${{ secrets.MUBASHER_TRADE_PASSWORD }}
          # ── Optional / extra env vars ────────────────────────────────────────
          CRON_SECRET:              ${{ secrets.CRON_SECRET }}
          NODE_ENV:                 production
        run: node scripts/runScraper.js
