name: 📊 EGX Fair Value Scraper (ArabicStock)

on:
  # Triggered via Vercel /trigger-arabicstock-values
  repository_dispatch:
    types: [trigger-arabicstock-values]

  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Fair Values (ArabicStock)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Node dependencies
        working-directory: backend
        run: npm ci

      - name: 🔄 Run ArabicStock daily scrape script
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          NODE_ENV: production
        run: node scripts/scrapeArabicStockFairValues.js
